name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        cache: 'pip'
        
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libgl1 libglib2.0-0
      
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black isort
        
    - name: Check code formatting with black
      run: |
        black --check .
        
    - name: Check code format with isort
      run: |
        isort --check-only .
        
    - name: Run import & syntax verification
      run: |
        python -c "import sys; sys.path.insert(0,'.'); from models.patchcore import PatchCore; from models.autoencoder import Autoencoder; from models.cnn_feature import CNNFeatureExtractor; from models.custom_resnet import CustomResNet18; from data_processing.mvtec import MVTecDataset; from app_utils.config import load_config; from app_utils.checkpoint import save_checkpoint, load_checkpoint; from evaluation.metrics import compute_auroc; import ast; ast.parse(open('app.py','r',encoding='utf-8').read()); print('CI VERIFICATION: PASS')"
